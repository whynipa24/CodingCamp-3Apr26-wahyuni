<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense &amp; Budget Visualizer</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- Header / Balance -->
    <header>
      <h1>Expense &amp; Budget Visualizer</h1>
      <p class="balance-label">Total Spent</p>
      <p class="balance-display">
        <span id="balance-amount">£0.00</span>
      </p>
    </header>

    <main>
      <!-- Transaction Input Form -->
      <section aria-labelledby="form-heading">
        <h2 id="form-heading">Add Transaction</h2>
        <form id="transaction-form" novalidate>
          <div class="form-group">
            <label for="item-name">Item Name</label>
            <input
              type="text"
              id="item-name"
              name="item-name"
              placeholder="e.g. Coffee"
              autocomplete="off"
            />
          </div>
          <div class="form-group">
            <label for="item-amount">Amount (£)</label>
            <input
              type="number"
              id="item-amount"
              name="item-amount"
              step="0.01"
              min="0.01"
              placeholder="0.00"
            />
          </div>
          <div class="form-group">
            <label for="item-category">Category</label>
            <select id="item-category" name="item-category">
              <option value="">Select a category</option>
            </select>
          </div>
          <button type="submit">Add Transaction</button>
          <p id="form-error" role="alert" aria-live="polite"></p>
        </form>
      </section>

      <!-- Custom Category Input -->
      <section aria-labelledby="category-heading">
        <h2 id="category-heading">Add Custom Category</h2>
        <div class="category-input-area">
          <label for="new-category">New Category Name</label>
          <input
            type="text"
            id="new-category"
            name="new-category"
            placeholder="e.g. Healthcare"
            autocomplete="off"
          />
          <button type="button" id="add-category-btn">Add Category</button>
          <p id="category-error" role="alert" aria-live="polite"></p>
        </div>
      </section>

      <!-- Sort Control -->
      <section aria-labelledby="sort-heading">
        <h2 id="sort-heading">Transaction History</h2>
        <div class="sort-control-wrapper">
          <label for="sort-control">Sort by</label>
          <select id="sort-control" name="sort-control">
            <option value="">Default (insertion order)</option>
            <option value="amount-asc">Amount: Low to High</option>
            <option value="amount-desc">Amount: High to Low</option>
            <option value="category-asc">Category: A–Z</option>
          </select>
        </div>

        <!-- Transaction List -->
        <ul id="transaction-list" aria-label="Transaction list">
          <li class="empty-state">No transactions recorded yet.</li>
        </ul>
      </section>

      <!-- Spending Chart -->
      <section aria-labelledby="chart-heading">
        <h2 id="chart-heading">Spending by Category</h2>
        <canvas id="spending-chart" aria-label="Pie chart of spending by category" role="img"></canvas>
        <p id="chart-placeholder">No data to display. Add a transaction to see your spending chart.</p>
      </section>

      <!-- Monthly Summary -->
      <section id="monthly-summary" aria-labelledby="summary-heading">
        <h2 id="summary-heading">Monthly Summary</h2>
        <button type="button" id="toggle-summary" aria-expanded="false" aria-controls="summary-content">
          Show Monthly Summary
        </button>
        <div id="summary-content" hidden></div>
      </section>
    </main>

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <!-- App -->
    <script src="js/app.js"></script>
  </body>
</html>
